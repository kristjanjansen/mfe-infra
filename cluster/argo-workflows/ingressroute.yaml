apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: argo-workflows
  namespace: argo
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`argo.mfe.fachwerk.dev`)
      kind: Rule
      services:
        - name: argo-workflows-server
          port: 2746
  tls:
    certResolver: letsencrypt
