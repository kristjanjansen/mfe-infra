name: PR Preview Environment

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      port:
        required: true
        type: string
    secrets:
      infra_token:
        required: false

jobs:
  preview:
    runs-on: self-hosted
    permissions:
      pull-requests: write
      issues: write
      contents: read
      packages: write

    env:
      SERVICE_NAME: ${{ inputs.service_name }}
      PORT: ${{ inputs.port }}
      PR: ${{ github.event.number || 1 }}
      INFRA_TOKEN: ${{ secrets.infra_token }}

    steps:
      - uses: actions/checkout@v4

      - name: Infra token present?
        shell: bash
        run: |
          if [ -n "${INFRA_TOKEN}" ]; then
            echo "infra_token_present=true"
          else
            echo "infra_token_present=false"
          fi

      - name: Checkout mfe-infra (for provider config)
        uses: actions/checkout@v4
        with:
          repository: kristjanjansen/mfe-infra
          path: mfe-infra
          token: ${{ github.token }}

      - name: Load provider config
        shell: bash
        run: |
          set -euo pipefail
          PROVIDER="${PROVIDER:-${{ vars.PROVIDER || 'local' }}}"
          source "mfe-infra/k8s/providers/${PROVIDER}/config.env"
          echo "MFE_DOMAIN=${MFE_DOMAIN}" >> "$GITHUB_ENV"
          echo "PROTOCOL=${PROTOCOL}" >> "$GITHUB_ENV"
          echo "REGISTRY=${REGISTRY}" >> "$GITHUB_ENV"

      - name: Compute preview identifiers
        shell: bash
        run: |
          set -euo pipefail

          PR_NUMBER='${{ github.event.number || 1 }}'
          TITLE='${{ github.event.pull_request.title || '' }}'

          SUFFIX="pr-${PR_NUMBER}"
          EVENT_ENVIRONMENT="pr"

          shopt -s nocasematch
          if [[ "$TITLE" =~ ^RELEASE[[:space:]]+([^[:space:]]+).*$ ]]; then
            RAW_VERSION="${BASH_REMATCH[1]}"

            SAFE_VERSION="$(echo "$RAW_VERSION" | tr -c 'a-zA-Z0-9' '-' | tr -s '-' | sed 's/^-*//;s/-*$//')"
            if [ -z "$SAFE_VERSION" ]; then
              SAFE_VERSION="0-0-0"
            fi

            SUFFIX="rel-${SAFE_VERSION}"
            EVENT_ENVIRONMENT="rel"
          fi
          shopt -u nocasematch

          if [ -n "${REGISTRY}" ]; then
            FULL_IMAGE="${REGISTRY}/${SERVICE_NAME}:${SUFFIX}"
          else
            FULL_IMAGE="${SERVICE_NAME}:${SUFFIX}"
          fi

          echo "NAMESPACE=${SERVICE_NAME}-${SUFFIX}" >> "$GITHUB_ENV"
          echo "IMAGE=${FULL_IMAGE}" >> "$GITHUB_ENV"
          echo "HOST=${SUFFIX}--${SERVICE_NAME}.${MFE_DOMAIN}" >> "$GITHUB_ENV"
          echo "DEPLOY_URL=${PROTOCOL}://${SUFFIX}--${SERVICE_NAME}.${MFE_DOMAIN}" >> "$GITHUB_ENV"
          echo "EVENT_ENVIRONMENT=${EVENT_ENVIRONMENT}" >> "$GITHUB_ENV"

      - name: Resolve .env.services into .env
        shell: bash
        run: |
          if [ -f .env.services ]; then
            echo "Resolving .env.services for build..."
            while IFS= read -r line || [ -n "$line" ]; do
              line=$(echo "$line" | xargs)
              [[ -z "$line" || "$line" =~ ^# ]] && continue
              KEY="${line%%=*}"
              VALUE="${line#*=}"
              KEY=$(echo "$KEY" | xargs)
              VALUE=$(echo "$VALUE" | xargs)
              [[ -z "$KEY" || -z "$VALUE" ]] && continue
              if [[ "$VALUE" =~ ^https?:// ]]; then
                echo "${KEY}=${VALUE}" >> .env
              else
                SVC=$(echo "$KEY" | tr '[:upper:]' '[:lower:]' | tr '_' '-')
                SLUG=$(echo "$VALUE" | tr '.' '-')
                URL="${PROTOCOL}://${SLUG}--${SVC}.${MFE_DOMAIN}"
                echo "${KEY}_URL=${URL}" >> .env
                echo "  ${KEY}=${VALUE} -> ${KEY}_URL=${URL}"
              fi
            done < .env.services
          fi

      - name: Log in to container registry
        if: ${{ env.REGISTRY != '' }}
        run: echo "${{ github.token }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push Docker image
        run: |
          docker build \
            --build-arg SERVICE_NAME="$SERVICE_NAME" \
            -t "$IMAGE" .
          if [ -n "${REGISTRY}" ]; then
            docker push "$IMAGE"
          fi

      - name: Deploy preview via infra action
        uses: kristjanjansen/mfe-infra/.github/actions/deploy-preview@main
        with:
          service_name: ${{ env.SERVICE_NAME }}
          namespace: ${{ env.NAMESPACE }}
          image: ${{ env.IMAGE }}
          host: ${{ env.HOST }}
          port: ${{ env.PORT }}

      - name: Comment PR
        uses: kristjanjansen/mfe-infra/.github/actions/comment-preview@main
        with:
          header: Preview - ${{ env.SERVICE_NAME }}
          message: |
            🚀 Preview ready: ${{ env.DEPLOY_URL }}

      - name: Record deploy event
        if: ${{ env.INFRA_TOKEN != '' }}
        uses: kristjanjansen/mfe-infra/.github/actions/record-deploy-event@main
        with:
          token: ${{ env.INFRA_TOKEN }}
          app_name: ${{ env.SERVICE_NAME }}
          environment: ${{ env.EVENT_ENVIRONMENT }}
          deploy_url: ${{ env.DEPLOY_URL }}
          status: ${{ job.status }}

  cleanup:
    if: github.event.action == 'closed'
    runs-on: self-hosted

    env:
      SERVICE_NAME: ${{ inputs.service_name }}

    steps:
      - name: Compute preview identifiers
        shell: bash
        run: |
          set -euo pipefail

          PR_NUMBER='${{ github.event.number || 1 }}'
          TITLE='${{ github.event.pull_request.title || '' }}'

          SUFFIX="pr-${PR_NUMBER}"
          SHOULD_DELETE="true"

          shopt -s nocasematch
          if [[ "$TITLE" =~ ^RELEASE[[:space:]]+([^[:space:]]+).*$ ]]; then
            RAW_VERSION="${BASH_REMATCH[1]}"

            SAFE_VERSION="$(echo "$RAW_VERSION" | tr -c 'a-zA-Z0-9' '-' | tr -s '-' | sed 's/^-*//;s/-*$//')"
            if [ -z "$SAFE_VERSION" ]; then
              SAFE_VERSION="0-0-0"
            fi

            SUFFIX="rel-${SAFE_VERSION}"
            SHOULD_DELETE="false"
          fi
          shopt -u nocasematch

          echo "NAMESPACE=${SERVICE_NAME}-${SUFFIX}" >> "$GITHUB_ENV"
          echo "SHOULD_DELETE=${SHOULD_DELETE}" >> "$GITHUB_ENV"

      - uses: kristjanjansen/mfe-infra/.github/actions/delete-preview@main
        if: env.SHOULD_DELETE == 'true'
        with:
          namespace: ${{ env.NAMESPACE }}
