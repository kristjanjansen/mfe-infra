name: Release Preview

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      port:
        required: true
        type: string
      version:
        required: true
        type: string
    outputs:
      safe_version:
        description: "Sanitized version suitable for names (e.g. 1-2-3)"
        value: ${{ jobs.release_preview.outputs.safe_version }}
      version_no_v:
        description: "Normalized version without leading v/V (e.g. 1.2.3)"
        value: ${{ jobs.release_preview.outputs.version_no_v }}
      tag_version:
        description: "Normalized tag version (e.g. v1.2.3)"
        value: ${{ jobs.release_preview.outputs.tag_version }}
      namespace:
        description: "Kubernetes namespace deployed to"
        value: ${{ jobs.release_preview.outputs.namespace }}
      host:
        description: "Preview host"
        value: ${{ jobs.release_preview.outputs.host }}
      url:
        description: "Preview URL"
        value: ${{ jobs.release_preview.outputs.url }}
    secrets:
      infra_token:
        required: false

jobs:
  release_preview:
    runs-on: self-hosted

    permissions:
      pull-requests: read
      contents: read
      packages: write

    env:
      SERVICE_NAME: ${{ inputs.service_name }}
      PORT: ${{ inputs.port }}
      INFRA_TOKEN: ${{ secrets.infra_token }}

    outputs:
      safe_version: ${{ steps.compute.outputs.safe_version }}
      version_no_v: ${{ steps.compute.outputs.version_no_v }}
      tag_version: ${{ steps.compute.outputs.tag_version }}
      namespace: ${{ steps.compute.outputs.namespace }}
      host: ${{ steps.compute.outputs.host }}
      url: ${{ steps.compute.outputs.url }}

    steps:
      - uses: actions/checkout@v4

      - name: Infra token present?
        shell: bash
        run: |
          if [ -n "${INFRA_TOKEN}" ]; then
            echo "infra_token_present=true"
          else
            echo "infra_token_present=false"
          fi

      - name: Checkout mfe-infra (for provider config)
        uses: actions/checkout@v4
        with:
          repository: kristjanjansen/mfe-infra
          path: mfe-infra
          token: ${{ github.token }}

      - name: Load provider config
        shell: bash
        run: |
          set -euo pipefail
          PROVIDER="${PROVIDER:-${{ vars.PROVIDER || 'local' }}}"
          source "mfe-infra/k8s/providers/${PROVIDER}/config.env"
          echo "MFE_DOMAIN=${MFE_DOMAIN}" >> "$GITHUB_ENV"
          echo "PROTOCOL=${PROTOCOL}" >> "$GITHUB_ENV"
          echo "REGISTRY=${REGISTRY}" >> "$GITHUB_ENV"

      - name: Compute release preview identifiers
        id: compute
        shell: bash
        run: |
          set -euo pipefail

          RAW='${{ inputs.version }}'
          TOKEN="${RAW%% *}"

          VERSION_NO_V="$TOKEN"
          if [[ "$VERSION_NO_V" =~ ^[vV](.+)$ ]]; then
            VERSION_NO_V="${BASH_REMATCH[1]}"
          fi

          SAFE_VERSION="$(echo "$VERSION_NO_V" | tr -c 'a-zA-Z0-9' '-' | tr -s '-' | sed 's/^-*//;s/-*$//')"
          if [ -z "$SAFE_VERSION" ]; then
            SAFE_VERSION="0-0-0"
          fi

          SUFFIX="rel-${SAFE_VERSION}"

          NAMESPACE="${SERVICE_NAME}-${SUFFIX}"
          HOST="${SUFFIX}--${SERVICE_NAME}.${MFE_DOMAIN}"
          URL="${PROTOCOL}://${HOST}"
          if [ -n "${REGISTRY}" ]; then
            IMAGE="${REGISTRY}/${SERVICE_NAME}:${SUFFIX}"
          else
            IMAGE="${SERVICE_NAME}:${SUFFIX}"
          fi
          TAG_VERSION="v${VERSION_NO_V}"

          echo "NAMESPACE=${NAMESPACE}" >> "$GITHUB_ENV"
          echo "HOST=${HOST}" >> "$GITHUB_ENV"
          echo "URL=${URL}" >> "$GITHUB_ENV"
          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"

          echo "safe_version=${SAFE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "version_no_v=${VERSION_NO_V}" >> "$GITHUB_OUTPUT"
          echo "tag_version=${TAG_VERSION}" >> "$GITHUB_OUTPUT"
          echo "namespace=${NAMESPACE}" >> "$GITHUB_OUTPUT"
          echo "host=${HOST}" >> "$GITHUB_OUTPUT"
          echo "url=${URL}" >> "$GITHUB_OUTPUT"

      - name: Resolve .env.services into .env
        shell: bash
        run: |
          if [ -f .env.services ]; then
            echo "Resolving .env.services for build..."
            while IFS= read -r line || [ -n "$line" ]; do
              line=$(echo "$line" | xargs)
              [[ -z "$line" || "$line" =~ ^# ]] && continue
              KEY="${line%%=*}"
              VALUE="${line#*=}"
              KEY=$(echo "$KEY" | xargs)
              VALUE=$(echo "$VALUE" | xargs)
              [[ -z "$KEY" || -z "$VALUE" ]] && continue
              if [[ "$VALUE" =~ ^https?:// ]]; then
                echo "${KEY}=${VALUE}" >> .env
              else
                SVC=$(echo "$KEY" | tr '[:upper:]' '[:lower:]' | tr '_' '-')
                SLUG=$(echo "$VALUE" | tr '.' '-')
                URL="${PROTOCOL}://${SLUG}--${SVC}.${MFE_DOMAIN}"
                echo "${KEY}_URL=${URL}" >> .env
                echo "  ${KEY}=${VALUE} -> ${KEY}_URL=${URL}"
              fi
            done < .env.services
            echo "Generated .env:"
            cat .env
          fi

      - name: Log in to container registry
        if: ${{ env.REGISTRY != '' }}
        run: echo "${{ github.token }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push Docker image
        run: |
          docker build \
            --build-arg SERVICE_NAME="$SERVICE_NAME" \
            -t "$IMAGE" .
          if [ -n "${REGISTRY}" ]; then
            docker push "$IMAGE"
          fi

      - name: Deploy release preview via infra action
        uses: kristjanjansen/mfe-infra/.github/actions/deploy-preview@main
        with:
          service_name: ${{ env.SERVICE_NAME }}
          namespace: ${{ env.NAMESPACE }}
          image: ${{ env.IMAGE }}
          host: ${{ env.HOST }}
          port: ${{ env.PORT }}

      - name: Record deploy event
        if: ${{ env.INFRA_TOKEN != '' }}
        uses: kristjanjansen/mfe-infra/.github/actions/record-deploy-event@main
        with:
          token: ${{ env.INFRA_TOKEN }}
          app_name: ${{ env.SERVICE_NAME }}
          environment: rel
          deploy_url: ${{ env.URL }}
          status: ${{ job.status }}

      - name: Write summary
        shell: bash
        run: |
          {
            echo "${PROTOCOL}://${HOST}"
          } >> "$GITHUB_STEP_SUMMARY"
